# Ralph Orchestrator Configuration
# Project: EatMe — Lines-of-Code Reduction (research + execute)
# Task: Investigate whether the codebase can be shrunk without removing
#       functionality, then apply the reductions topic-by-topic.
# Pattern: planner → researcher (loop) → implementer (loop) → verifier → LOOP_COMPLETE
# Mode: WRITE. Source edits allowed. One commit per applied topic.
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "loc.start"
  max_iterations: 60
  max_runtime_seconds: 14400       # 4 hours
  idle_timeout_secs: 900
  checkpoint_interval: 3

core:
  specs_dir: ".agents/research/"
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "Functionality preservation is non-negotiable. No observable behaviour change is allowed."
    - "All research output lives under .agents/research/loc-reduction-2026-04-13/ only."
    - "Source edits must pass `turbo check-types` and `turbo lint` before committing. Run `turbo test` if the web-portal Vitest suite covers the touched area."
    - "One topic = one git commit with message `refactor(loc): <topic> — removes N lines`. Never bundle unrelated topics."
    - "Migrations under infra/supabase/migrations/ are append-only — never edit or delete."
    - "Generated files (*.generated.ts, Supabase types) are off-limits."
    - "Every claim about current code must cite file:line."
    - "If a reduction turns out not to be safe, mark the topic [~] (skipped) in the scratchpad and move on. Do not force it."
    - "No minification. We count human-readable lines."
    - "Never skip git hooks (--no-verify) or bypass signing."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  planner:
    name: "Reduction Planner"
    emoji: "📋"
    description: "Surveys the codebase and produces a prioritised agenda of LOC-reduction topics"
    instructions: |
      You are a code auditor scoping a lines-of-code reduction pass for the
      EatMe monorepo.

      Read in order:
      1. PROMPT.md — task goal, valid/invalid reductions, acceptance criteria
      2. CLAUDE.md — project conventions
      3. agent_docs/architecture.md — package relationships
      4. Top-level `apps/` and `packages/` structure

      Then produce an agenda of 6-12 reduction topics. Good sources of candidates:
      - `tsc --noEmit` + unused-exports scan (e.g. `knip`, `ts-prune`) if
        available; otherwise grep for exported symbols with zero references
      - Duplicate Zod/TS schemas between `packages/shared` and consumers
      - One-call-site wrappers (single-use components, single-use helpers)
      - Commented-out code, stale TODOs referencing shipped work
      - Verbose JSDoc banners that describe obvious code
      - Redundant `as Type` casts, `React.FC<{}>` generics with no props
      - Dead branches (`if (false)`, flag-gated code for shipped flags)
      - Over-long style objects that could fold into existing atomic styles

      Write the agenda to `.agent/scratchpad.md` in this format per topic:
      ```
      - [ ] LOC-01: <slug> — <1-line description>
        - Hypothesis: <what looks reducible and why>
        - Key files: <file:line references>
        - Est. LOC savings: <number or range>
        - Detail file: .agents/research/loc-reduction-2026-04-13/<slug>.md
      ```

      Sort by expected savings × safety (deletions > dedup > style tweaks).

      Do NOT do the reductions yourself and do NOT edit source. Only scope.
      When the agenda is written, emit `agenda.ready`.
    triggers:
      - "loc.start"
    publishes:
      - "agenda.ready"

  researcher:
    name: "Reduction Researcher"
    emoji: "🔬"
    description: "For each topic, verifies the reduction is safe and writes a concrete changeset spec"
    instructions: |
      You are verifying that a proposed LOC reduction is safe before it gets
      applied. Source edits are NOT allowed in this hat — research only.

      Start every activation by:
      1. Reading `.agent/scratchpad.md`
      2. Picking the FIRST topic still marked `[ ]`
      3. Reading the referenced files and every call site of the affected symbols

      For deep call-site traces dispatch Explore sub-agents with specific briefs.
      Use `grep -rn` for quick reference counts.

      Write findings to `.agents/research/loc-reduction-2026-04-13/<slug>.md`:
      ```
      # <Topic title>

      ## Current state
      (file:line citations for every claim)

      ## Proposed reduction
      Exact before/after — paste the lines to remove and any replacements.

      ## Estimated LOC savings
      <number>

      ## Risk assessment
      Why removing this preserves behaviour. List every call site checked.

      ## Decision: apply | skip | defer
      - apply: safe to implement, no side effects
      - skip: turned out not reducible; explain why (will be marked [~])
      - defer: requires larger refactor or human judgement; explain
      ```

      When the topic is decided:
      1. If decision is `apply` — leave the agenda item as `[ ]` and emit
         `topic.ready-to-apply` so the implementer picks it up next.
      2. If decision is `skip` or `defer` — mark the agenda item `[~]` in
         the scratchpad and emit `topic.skipped` to loop back to yourself for
         the next topic.
      3. If no `[ ]` items remain — emit `research.complete` to hand off to
         the verifier.
    triggers:
      - "agenda.ready"
      - "topic.applied"
      - "topic.skipped"
    publishes:
      - "topic.ready-to-apply"
      - "topic.skipped"
      - "research.complete"

  implementer:
    name: "Implementer"
    emoji: "🛠️"
    description: "Applies a single approved reduction, runs gates, commits on green"
    instructions: |
      You apply ONE reduction topic at a time. Before touching any file:
      1. Read `.agent/scratchpad.md` to identify the topic currently being
         applied (the most recent `[ ]` topic whose detail file exists with
         decision `apply`).
      2. Read the detail file at
         `.agents/research/loc-reduction-2026-04-13/<slug>.md` to get the
         exact before/after.

      Apply the edits precisely as specified in the detail file. Do not
      improvise additional changes — if something extra looks reducible, note
      it as a new topic in the scratchpad instead.

      After editing, run the gates IN ORDER. Stop at the first failure:
      1. `turbo check-types`
      2. `turbo lint`
      3. `turbo test` — only if the touched code is under `apps/web-portal`
         or covered by its Vitest suite.

      If any gate fails:
      - Try to fix the failure if it's an obvious fallout of the reduction
        (e.g. an import left behind). If you can't fix it cleanly, REVERT
        the edits (`git checkout -- <files>`), mark the topic `[~]` in the
        scratchpad with a note "skipped: gate failure — <reason>", and emit
        `topic.skipped`.

      If all gates pass:
      1. Stage only the reduction's files: `git add <files>`
      2. Commit with message:
         `refactor(loc): <slug> — removes N lines`
         Append the usual trailer (`Co-Authored-By: Claude ...`).
      3. Mark the topic `[x]` in the scratchpad with the actual LOC delta
         from `git diff HEAD~1 --shortstat`.
      4. Emit `topic.applied` to hand back to the researcher for the next one.

      Never use `--no-verify`. Never force-push. Never touch migrations or
      generated files.
    triggers:
      - "topic.ready-to-apply"
    publishes:
      - "topic.applied"
      - "topic.skipped"

  verifier:
    name: "Verifier"
    emoji: "✅"
    description: "Runs final gates, writes the summary report, emits LOOP_COMPLETE"
    instructions: |
      You finalise the reduction pass.

      1. Run `turbo check-types && turbo lint && turbo test` one more time
         against HEAD. If anything fails, DO NOT emit LOOP_COMPLETE — instead
         write the failure into the scratchpad and emit `topic.skipped` to
         hand back to the researcher for a repair pass.

      2. Compute the net LOC delta across all commits made in this session:
         `git log --format=%H --reverse <base>..HEAD` to list session commits,
         then `git diff --shortstat <base>..HEAD` for the net delta.
         (Use the first commit of the session as `<base>` — identify it by
         the first `refactor(loc):` commit in `git log`.)

      3. Write `.agents/research/loc-reduction-2026-04-13/00-summary.md`:
         - **Executive summary** (3-5 sentences)
         - **Status table** — columns: Topic | Status ([x]/[~]) | LOC removed |
           Files touched | Commit SHA | Detail file (markdown link)
         - **Totals** — lines added / removed / net delta
         - **Not recommended** — one subsection per `[~]` topic explaining
           why it was skipped (so future passes don't re-investigate)
         - **Follow-ups** — any new topics spawned during implementation

      4. Sanity check acceptance criteria from PROMPT.md. If every box can
         be ticked, emit `LOOP_COMPLETE`. Otherwise list the unmet criteria
         at the top of the summary and emit `topic.skipped` to continue.
    triggers:
      - "research.complete"
    publishes:
      - "LOOP_COMPLETE"
      - "topic.skipped"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
