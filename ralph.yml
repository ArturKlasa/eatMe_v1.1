# Ralph Orchestrator Configuration
# Task: Menu Ingestion & Enrichment Improvements
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 120               # Complex task: 11 deliverables across 8 files, UI work, prompt engineering, enrichment rewrite
  max_runtime_seconds: 21600         # 6 hours — large scope: types, GPT prompt, merge rewrite, review UI (2500+ line file), confirm endpoint, enrichment edge function, migration, onboarding
  idle_timeout_secs: 2400            # 40 min idle — some steps (review UI) are large and may take time
  checkpoint_interval: 3             # Git checkpoint every 3 iterations

core:
  specs_dir: ".agents/planning/2026-04-06-menu-ingestion-enrichment/"
  guardrails:
    - "Read the detailed design at .agents/planning/2026-04-06-menu-ingestion-enrichment/design/detailed-design.md before implementing any change."
    - "Read the research files in .agents/planning/2026-04-06-menu-ingestion-enrichment/research/ for decision rationale."
    - "Read the idea-honing.md in .agents/planning/2026-04-06-menu-ingestion-enrichment/ for all confirmed decisions and scope boundaries."
    - "Always read a file before modifying it. The codebase has recent changes from the universal dish structure initiative (migration 073)."
    - "The only new database migration is 074_enrichment_review_status.sql. All other columns (is_parent, parent_dish_id, dish_kind, serves, display_price_prefix) already exist."
    - "Do not add new dependencies except string-similarity for fuzzy matching."
    - "Reuse the existing three-pass parent-child insertion logic in restaurantService.ts — do not duplicate it in the confirm endpoint."
    - "When switching to Structured Outputs, use Zod schemas with zodResponseFormat() from openai/helpers/zod. Use z.lazy() for recursive variant types."
    - "Embeddings represent dish identity only — never include price, spice_level, dietary_tags, or allergens in embedding input."
    - "AI-inferred data must NEVER be auto-applied. Store in enrichment_payload with enrichment_review_status='pending_review' for admin approval."
    - "All existing menu scan flows must continue working for simple standard-dish menus. No regressions."
    - "When modifying menu-scan/page.tsx (2489 lines), extract new components into separate files to manage complexity."
    - "Update the Progress Log checkboxes in PROMPT.md after completing each item."
    - "Do not deviate from type definitions, field names, or enum values in the design document."
    - "Parent dishes have is_parent=true, price=0, no embedding, excluded from feed. This is already implemented — don't break it."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context"]

tasks:
  enabled: true

features:
  parallel: false              # Sequential — types must be updated before UI work, migration before enrichment changes
  auto_merge: false
  preflight:
    enabled: true
    strict: false
