# Ralph Orchestrator Configuration
# Project: EatMe — Auth Flow Fixes
# Task: Implement 11-step auth fix plan (proxy rename, app_metadata, DB triggers, etc.)
# Pattern: planner → implementer (loops) → documenter → done
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "start"
  max_iterations: 40
  max_runtime_seconds: 7200        # 2 hours
  idle_timeout_secs: 300
  checkpoint_interval: 3

core:
  specs_dir: "apps/web-portal/"
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "Read design/detailed-design.md before implementing each step — do not guess."
    - "Run 'cd apps/web-portal && npx turbo check-types' after every TypeScript change."
    - "Run 'cd apps/web-portal && npx vitest run' after every TypeScript change."
    - "If type-check or tests fail, fix the failure before moving to the next step."
    - "Do NOT implement Facebook OAuth — it is explicitly deferred."
    - "Mark each step [x] in implementation/plan.md only after verification passes."
    - "Do not modify files outside the scope of the current step."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  planner:
    name: "Planner"
    emoji: "📋"
    description: "Reads the implementation plan and sets up the work queue"
    instructions: |
      You are a senior engineer preparing to implement a series of auth flow fixes.

      Read these files in order:
      1. PROMPT.md — the task overview and acceptance criteria
      2. .agents/planning/2026-04-12-auth-flow-review/implementation/plan.md — the 11-step checklist
      3. .agents/planning/2026-04-12-auth-flow-review/design/detailed-design.md — code specs

      Then write a concise work queue to .agent/scratchpad.md with:
      - A summary of which steps are already checked [x] vs pending [ ]
      - The next step to implement (the first unchecked one)
      - Key files that step touches
      - Any prerequisite awareness (e.g. Step 2 needs Step 1 done first)

      Do NOT make any code changes.

      When the scratchpad is written, emit `plan.ready`.
    triggers:
      - "start"
    publishes:
      - "plan.ready"

  implementer:
    name: "Implementer"
    emoji: "🔨"
    description: "Picks the next unchecked step, implements it, verifies, and marks it done"
    instructions: |
      You are a senior engineer implementing auth flow fixes one step at a time.

      Start every activation by:
      1. Reading .agent/scratchpad.md to know which step to do next
      2. Reading the full step spec from .agents/planning/2026-04-12-auth-flow-review/implementation/plan.md
      3. Reading the matching section in .agents/planning/2026-04-12-auth-flow-review/design/detailed-design.md for exact code

      Implement the step. Then verify:
      - For TypeScript changes: run `cd apps/web-portal && npx turbo check-types` then `cd apps/web-portal && npx vitest run`
      - For SQL migration files: review the SQL for correctness — no automated test, just confirm it matches the spec
      - For doc changes (Step 11): confirm the doc accurately reflects the fixed code

      If verification fails:
      - Fix the failure (do not move on)
      - Re-run verification until it passes

      When the step passes:
      1. Mark it [x] in .agents/planning/2026-04-12-auth-flow-review/implementation/plan.md
      2. Update .agent/scratchpad.md to show which step comes next
      3. Check if any steps remain unchecked (Steps 1–10 only — Step 11 is handled by the documenter)

      If steps 1–10 still have unchecked items, emit `step.done` to loop back.
      If steps 1–10 are all checked [x], emit `code.complete` to hand off to the documenter.

      Scope discipline: only touch files described in the current step. Do not fix
      unrelated things you notice along the way.
    triggers:
      - "plan.ready"
      - "step.done"
    publishes:
      - "step.done"
      - "code.complete"

  documenter:
    name: "Documenter"
    emoji: "📝"
    description: "Updates auth-flow.md to match the fixed code, then completes the loop"
    instructions: |
      You are a technical writer updating the auth flow documentation to match the
      code that was just fixed.

      Read:
      - .agents/planning/2026-04-12-auth-flow-review/implementation/plan.md Step 11 — exact changes required
      - docs/project/workflows/auth-flow.md — current state of the doc
      - The key fixed files to confirm what they actually do now:
        - apps/web-portal/middleware.ts
        - apps/web-portal/app/auth/callback/route.ts
        - apps/web-portal/contexts/AuthContext.tsx
        - apps/web-portal/components/AdminRoute.tsx (if it exists)
        - infra/supabase/migrations/082_wire_signup_triggers.sql
        - infra/supabase/migrations/083_signup_user_profile_trigger.sql

      Apply all changes specified in Step 11 of the plan to auth-flow.md.

      When done, mark Step 11 [x] in .agents/planning/2026-04-12-auth-flow-review/implementation/plan.md.

      Then emit `LOOP_COMPLETE`.
    triggers:
      - "code.complete"
    publishes:
      - "LOOP_COMPLETE"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
