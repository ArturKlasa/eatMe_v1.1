# Ralph Orchestrator Configuration
# Task: Implement Performance Optimizations
# Preset: code-assist (planner → builder → critic → finalizer)
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 50                # 15 steps × ~3 iterations each on average
  max_runtime_seconds: 14400        # 4 hours — implementation is more demanding than investigation
  idle_timeout_secs: 1800           # 30 min idle threshold
  checkpoint_interval: 3            # Git checkpoint every 3 iterations to preserve working increments

core:
  specs_dir: ".agents/planning/2026-04-08-implement-performance-optimizations/"
  guardrails:
    - "IMPLEMENTATION TASK: You are implementing performance optimizations. Always read the implementation plan at .agents/planning/2026-04-08-implement-performance-optimizations/implementation/plan.md and the detailed design at .agents/planning/2026-04-08-implement-performance-optimizations/design/detailed-design.md before starting any step."
    - "Implement steps sequentially (Step 1 → Step 15). Do not skip steps or implement out of order — later steps depend on earlier ones."
    - "After completing each step, mark its checkbox in the Progress Log in PROMPT.md and in the checklist in implementation/plan.md."
    - "HARD CONSTRAINT: Do NOT touch anything related to the nearby-restaurants Edge Function. Files under infra/supabase/functions/nearby-restaurants/ and apps/mobile/src/services/geoService.ts are completely out of scope."
    - "HARD CONSTRAINT: Do NOT change the feed cache key format. The existing Redis key pattern (feed:userId:lat:lng:filters) must not be modified."
    - "After every TypeScript file change in apps/mobile or packages/, run: pnpm --filter @eatme/mobile tsc --noEmit. Fix all type errors before marking a step complete."
    - "For each Edge Function change, verify correctness by invoking the function locally with supabase functions serve before marking the step complete."
    - "Write tests alongside implementation — do not defer testing to a later step. Each step's test requirements are documented in implementation/plan.md."
    - "Do not add new npm dependencies beyond expo-image (Step 8). Use utilities already available in the codebase."
    - "When a step is fully implemented and tested, write a brief completion note under the step's checklist item in PROMPT.md before moving on."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

features:
  parallel: false               # Sequential implementation — steps depend on each other
  auto_merge: false
  preflight:
    enabled: false              # No preflight gates — implementation handles its own verification
