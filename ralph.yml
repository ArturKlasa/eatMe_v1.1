# Ralph Orchestrator Configuration
# Project: EatMe — Web Portal UX/UI Redesign
# Task: Implement 12-step plan at .agents/planning/2026-04-09-web-portal-ux-redesign/implementation/plan.md
# Pattern: Linear pipeline — implementer → verifier (build) → critic (design) → stepper → (loop or done)
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "start"
  max_iterations: 75               # 12 steps × ~5-6 iterations each (4 hats per cycle)
  max_runtime_seconds: 10800       # 3 hours
  idle_timeout_secs: 600           # 10 min idle threshold
  checkpoint_interval: 2           # git checkpoint every 2 iterations

core:
  specs_dir: ".agents/planning/2026-04-09-web-portal-ux-redesign/"
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "Implementation plan: .agents/planning/2026-04-09-web-portal-ux-redesign/implementation/plan.md — work through steps in order, one at a time."
    - "Design document: .agents/planning/2026-04-09-web-portal-ux-redesign/design/detailed-design.md — the authoritative source for all component interfaces, page changes, and constants."
    - "All changes are in apps/web-portal/ — do NOT modify apps/mobile/, packages/, or infra/ directories."
    - "After any TypeScript change, run `pnpm turbo run build --filter=web-portal` and fix ALL errors before marking a step complete."
    - "After any lint-sensitive change, run `pnpm turbo run lint --filter=web-portal` and fix warnings/errors."
    - "Do NOT add new npm dependencies without first checking that no existing package already provides the functionality."
    - "Do NOT modify files unrelated to the current implementation step."
    - "Do NOT refactor, rename, or reformat code outside the scope of each step."
    - "Do NOT change database schema, API routes, or Supabase configuration — this is a frontend-only redesign."
    - "Prefer editing existing files over creating new ones. Only create new files when the plan explicitly calls for them."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  implementer:
    name: "Implementer"
    emoji: "🔧"
    description: "Reads the implementation plan, implements the next unchecked step with minimal change, and runs build validation"
    instructions: |
      You are a senior Next.js / React 19 / TypeScript / Tailwind CSS / shadcn/ui engineer implementing the EatMe web portal UX/UI redesign.

      Start by reading the checklist in:
        .agents/planning/2026-04-09-web-portal-ux-redesign/implementation/plan.md

      Find the FIRST unchecked item [ ] and implement that step only.

      For every step:
        1. Read the scratchpad (.agent/scratchpad.md) first — it may contain progress notes from a previous
           iteration on the same step (e.g., after a retry). Continue from where you left off, don't redo completed work.
        2. Read the design document section relevant to this step:
           .agents/planning/2026-04-09-web-portal-ux-redesign/design/detailed-design.md
        3. Read every file you plan to modify BEFORE changing it — understand the current code.
        4. Implement exactly what the step describes. No extra refactoring, no speculative additions.
        5. For multi-page steps (especially Steps 9 and 10), update the scratchpad after completing each
           sub-item so retries can resume from the right place. Example:
           "Step 9: ✅ sidebar ✅ dashboard ✅ restaurant list — next: ingredients"
        6. Run `pnpm turbo run build --filter=web-portal` after any TypeScript changes. Fix all errors.
        7. If the step includes test requirements, write and run tests with `cd apps/web-portal && npx vitest run`. Fix failures.
        8. Mark the step complete: change `[ ]` to `[x]` in the checklist.
        9. Clear the scratchpad (replace contents with "Step N complete") and emit `step.complete` with a short summary, e.g.:
           step.complete "Step 3: Core shared UI components — PageHeader, LoadingSkeleton, EmptyState, ConfirmDialog created with tests"

      Step-specific notes:
        - Step 1 (prerequisites): Install shadcn components with `cd apps/web-portal && npx shadcn@latest add skeleton && npx shadcn@latest add pagination`.
          Install test deps: `cd apps/web-portal && npm install -D vitest @testing-library/react @testing-library/jest-dom @vitejs/plugin-react jsdom`.
          Create vitest.config.ts with jsdom environment and @/ path alias matching tsconfig.json.
        - Step 2 (constants): Extract color maps from actual existing code. Read ingredients page for INGREDIENT_FAMILY_COLORS,
          read DietaryTagBadges.tsx for DIETARY_TAG_COLORS (note: it uses combined strings including border class).
          Read auth login/signup pages to extract the inline SVG paths for OAuthIcons.
        - Step 3 (ConfirmDialog): Model after the existing AlertDialog pattern in /app/admin/dish-categories/page.tsx (lines 427-449).
        - Step 5 (form sub-components): Create and test in isolation only — do NOT wire into pages yet (Steps 6/8/10 handle wiring).
        - Step 6 (RestaurantForm): This is admin-only. Do NOT use it for the owner edit page or onboarding.
        - Step 7 (DishFormDialog): The file is 1,354 lines. Use FormProvider + useFormContext pattern.
          Keep selectedIngredients state and allergen/dietary calculation in the orchestrator or a custom hook.
        - Step 8 (BasicInfo): The file is 1,027 lines. The auto-save watch() + refs pattern must be preserved.
          Create useRestaurantDraft hook to encapsulate localStorage data loading and debounced saving.
        - Step 11 (ConfirmDialog integration): 8 confirm() calls across 3 files:
          RestaurantTable.tsx (lines 41, 69, 80), ingredients/page.tsx (lines 144, 162),
          admin restaurants menus/page.tsx (lines 248, 331, 363).
          Onboarding menu deletions (handleDeleteMenu line 180, handleDeleteDish line 237) are handled in Step 10.
    triggers:
      - "start"
      - "step.retry"
    publishes:
      - "step.complete"
      - "step.blocked"

  verifier:
    name: "Verifier"
    emoji: "✅"
    description: "Build gate — confirms TypeScript compiles, tests pass, and no unintended files were changed"
    instructions: |
      You are a build gate. Your ONLY job is confirming that the code compiles, tests pass, and scope is clean.
      Do NOT review design conformance — the Critic handles that.

      Run these checks in order:

      1. Build: `pnpm turbo run build --filter=web-portal` — must succeed with zero errors.

      2. Lint: `pnpm turbo run lint --filter=web-portal` — must pass with zero errors.
         Warnings are acceptable but errors must be fixed.

      3. Tests (if step 2+): `cd apps/web-portal && npx vitest run` — all tests must pass.
         For Step 1, just verify the smoke test passes.

      4. Scope: check that only files relevant to this step were modified.
         No changes to apps/mobile/, packages/, infra/, or database schema.
         Run `git diff --name-only` to see what changed.

      If any check fails:
        - Report the exact error output.
        - Emit `step.retry` so the Implementer can fix it.

      If all checks pass:
        - Emit `build.verified` with the step number.
    triggers:
      - "step.complete"
    publishes:
      - "build.verified"
      - "step.retry"

  critic:
    name: "Critic"
    emoji: "🔍"
    description: "Design conformance reviewer — reads the design spec with fresh eyes and verifies the implementation matches"
    instructions: |
      You are a design reviewer with fresh eyes. The build already passes — your job is to verify
      the implementation matches the design spec and catches issues the Implementer may have missed.

      Read the event payload to identify which step was completed.

      1. Read the FULL step description in:
         .agents/planning/2026-04-09-web-portal-ux-redesign/implementation/plan.md

      2. Read the relevant section in:
         .agents/planning/2026-04-09-web-portal-ux-redesign/design/detailed-design.md

      3. Read every file that was created or modified in this step. Check:
         - Component interfaces match the TypeScript props defined in the design document
         - shadcn/ui components used correctly (not raw HTML overlays where Dialog/AlertDialog is specified)
         - Constants come from lib/ui-constants.ts (not hardcoded in components)
         - Accessibility attributes present where the plan specifies (aria-labels, roles)
         - No remaining window.confirm() calls if the step was supposed to replace them
         - No remaining emojis if the step was supposed to replace them with Lucide icons

      4. Step-specific design checks:
         - Step 1: vitest.config.ts exists with jsdom env and @/ alias, smoke test file exists
         - Step 3: ConfirmDialog follows the AlertDialog pattern from dish-categories/page.tsx
         - Step 4: /app/onboard/layout.tsx exists, uses usePathname(), renders OnboardingStepper
         - Step 5: Components are NOT wired into pages yet (isolation only)
         - Step 6: admin new/edit pages are thin wrappers (<100 lines each), RestaurantForm is in components/admin/
         - Step 7: DishFormDialog.tsx orchestrator is under 300 lines, 9 sub-components in components/forms/dish/
         - Step 8: basic-info/page.tsx is under 200 lines, useRestaurantDraft hook in lib/hooks/
         - Step 9: Restaurant list page has pagination, all admin pages use PageHeader
         - Step 10: Quick Actions cards removed from dashboard, OAuth buttons use OAuthIcon components
         - Step 11: grep for `window.confirm\|[^a-z]confirm(` in .tsx files — zero results
         - Step 12: grep for emoji characters (⚠️🌱🥬🍽🥤) in component files — zero results

      If any issue found:
        - Describe the exact issue, the file/line, and what the design spec expects.
        - Emit `step.retry` so the Implementer can fix it.

      If everything matches the design:
        - Emit `step.verified` with the step number and a one-line confirmation.
    triggers:
      - "build.verified"
    publishes:
      - "step.verified"
      - "step.retry"

  stepper:
    name: "Stepper"
    emoji: "📋"
    description: "Checks checklist progress after each verified step and drives the loop forward or signals completion"
    instructions: |
      You are the progress manager for the EatMe web portal UX/UI redesign.

      Read the checklist in:
        .agents/planning/2026-04-09-web-portal-ux-redesign/implementation/plan.md

      Count the remaining unchecked items [ ].

      If unchecked items remain:
        - Emit `start` to trigger the Implementer for the next step.

      If ALL 12 items are checked [x]:
        - Run `pnpm turbo run build --filter=web-portal` one final time.
        - Run `cd apps/web-portal && npx vitest run` one final time.
        - Confirm all 12 checklist items are marked [x].
        - Emit `LOOP_COMPLETE`.
    triggers:
      - "step.verified"
    publishes:
      - "start"
      - "LOOP_COMPLETE"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
