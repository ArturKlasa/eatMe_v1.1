# Ralph Orchestrator Configuration
# Task: Investigate Application Optimization Opportunities
# Hat: Investigator — read-only analysis, no code changes
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 25                # Investigation task: broad analysis across multiple dimensions
  max_runtime_seconds: 7200         # 2 hours — enough to survey DB, API, mobile, caching, edge functions
  idle_timeout_secs: 900            # 15 min idle — investigator should move continuously between areas
  checkpoint_interval: 5            # Git checkpoint every 5 iterations (findings notes only, no code)

core:
  specs_dir: ".agents/planning/2026-04-07-optimize-performance/"
  guardrails:
    - "INVESTIGATOR HAT: This is a read-only investigation. Do NOT modify any source files, migrations, package.json, or configuration files. Your only output is findings written to .agents/planning/2026-04-07-optimize-performance/findings/."
    - "Write all findings as structured markdown files under .agents/planning/2026-04-07-optimize-performance/findings/. Use one file per domain (e.g. database.md, mobile-rendering.md, edge-functions.md, caching.md, api-payload.md, bundle-size.md)."
    - "For each finding include: (1) Title, (2) Severity [Critical/High/Medium/Low], (3) Effort [Easy/Medium/Hard], (4) Current behavior with file:line references, (5) Root cause, (6) Proposed fix with concrete code sketch, (7) Estimated impact."
    - "Database domain: Look for missing indexes (use EXPLAIN ANALYZE patterns in code), N+1 query patterns in services, RLS policy overhead (especially security definer functions called in policy USING clauses), slow PostGIS radius queries, pgvector approximate vs exact search settings, and pg_cron job contention."
    - "Edge function domain: Examine cold start risk (bundle size in each function's index.ts), unnecessary sequential awaits inside functions that could be parallelised, large payload sizes returned to clients, and whether Redis caching (Upstash) is used effectively or bypassed."
    - "Mobile app domain: Look for unnecessary re-renders (missing useMemo/useCallback), large list rendering without FlatList optimization (getItemLayout, keyExtractor), Zustand store selectors that cause whole-store re-subscriptions, image loading without caching, and heavy imports that bloat the JS bundle."
    - "API/network domain: Check response payload sizes (are full objects returned where IDs suffice?), over-fetching in Supabase .select() calls (wildcards vs explicit columns), and realtime subscription count per screen."
    - "Caching domain: Identify data that changes infrequently but is fetched on every render or navigation (restaurant metadata, user preferences, dish enrichment). Check if Redis (Upstash) is used in edge functions and whether TTLs are appropriate."
    - "Cover ALL of these domains before writing LOOP_COMPLETE: database, edge functions, mobile rendering, API payloads, caching, bundle/startup time."
    - "Update the Progress Log checkboxes in PROMPT.md after completing each investigation domain."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context"]

tasks:
  enabled: true

features:
  parallel: true               # Investigator can survey multiple domains concurrently
  auto_merge: false
  preflight:
    enabled: false             # No preflight needed for read-only investigation
