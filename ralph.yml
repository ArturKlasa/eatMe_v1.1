# Ralph Orchestrator Configuration
# Project: EatMe — Rating System Redesign
# Task: Implement 8-step plan at .agents/planning/2026-04-08-rating-system/implementation/plan.md
# Pattern: Linear pipeline — implementer → verifier → stepper → (loop or done)
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "start"          # kicks off the Implementer on loop start
  max_iterations: 40               # 8 steps × ~4-5 iterations each
  max_runtime_seconds: 7200        # 2 hours
  idle_timeout_secs: 600           # 10 min idle threshold
  checkpoint_interval: 2           # git checkpoint every 2 iterations

core:
  specs_dir: ".agents/planning/2026-04-08-rating-system/"
  guardrails:
    - "Implementation plan: .agents/planning/2026-04-08-rating-system/implementation/plan.md — work through steps in order, one at a time."
    - "Design document: .agents/planning/2026-04-08-rating-system/design/detailed-design.md — the authoritative source for all interfaces, SQL, and component specs."
    - "After any TypeScript change, run `pnpm tsc --noEmit` from the repo root and fix ALL errors before marking a step complete."
    - "Migrations go in infra/supabase/migrations/ — the next migration number is 079 (filename: 079_rating_system_redesign.sql)."
    - "After Step 1 (migrations), regenerate types: cd packages/database && supabase gen types typescript --local > src/types.ts"
    - "Do NOT add new npm or Deno dependencies without first checking that no existing package already provides the functionality."
    - "Do NOT modify files unrelated to the current implementation step."
    - "Do NOT refactor, rename, or reformat code outside the scope of each step."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  implementer:
    name: "Implementer"
    emoji: "🔧"
    description: "Reads the implementation plan, implements the next unchecked step with minimal change, and runs TypeScript validation"
    instructions: |
      You are a senior React Native / TypeScript / Supabase engineer implementing the EatMe rating system redesign.

      Start by reading the checklist in:
        .agents/planning/2026-04-08-rating-system/implementation/plan.md

      Find the FIRST unchecked item [ ] and implement that step only.

      For every step:
        1. Read the design document section relevant to this step:
           .agents/planning/2026-04-08-rating-system/design/detailed-design.md
        2. Read every file you plan to modify BEFORE changing it — understand the current code.
        3. Implement exactly what the step describes. No extra refactoring, no speculative additions.
        4. Run `pnpm tsc --noEmit` from the repo root after any TypeScript changes. Fix all errors.
        5. Mark the step complete: change `[ ]` to `[x]` in the checklist.
        6. Emit `step.complete` with a short summary, e.g.:
           step.complete "Step 1: DB migrations — 079_rating_system_redesign.sql created, views rebuilt"

      Step-specific notes:
        - Step 1 (migrations): create infra/supabase/migrations/079_rating_system_redesign.sql.
          Drop restaurant_ratings_summary FIRST, then dish_ratings_summary (dependency order).
          After applying, regenerate types: run `supabase gen types typescript --local > packages/database/src/types.ts`
          from the packages/database directory.
        - Step 2 (types): remove DishRatingStats from types/rating.ts only after confirming no consumers
          remain. Use grep to check before deleting.
        - Step 4 (InContextRating): add getUserDishOpinions() to dishRatingService.ts in the same step
          so RestaurantDetailScreen can pre-populate the already-rated state.
        - Step 7 (gamification): create apps/mobile/src/services/gamificationService.ts as a new file.
          Wire updateStreak and checkAndAwardTrustedTasterBadge into BOTH submitRating and
          submitInContextRating as non-fatal calls (wrapped in .catch(() => null)).
        - Step 8 (i18n): add keys to all three locale files — en.json, es.json, pl.json.
          Use accurate translations, not placeholder text.
    triggers:
      - "start"
      - "step.retry"
    publishes:
      - "step.complete"
      - "step.blocked"

  verifier:
    name: "Verifier"
    emoji: "✅"
    description: "Verifies the implemented step against the design spec and confirms TypeScript compiles cleanly before allowing progress"
    instructions: |
      You are a technical lead verifying that the just-completed step was implemented correctly.

      Read the event payload to identify which step was completed.
      Read .agents/planning/2026-04-08-rating-system/design/detailed-design.md for the expected spec.

      Run these checks:

      1. TypeScript: `pnpm tsc --noEmit` from the repo root — must exit 0 with zero errors.

      2. Correctness: re-read every modified file and confirm each matches the design spec for this step:
         - Correct function signatures and interface shapes
         - SQL uses LATERAL joins (not correlated subqueries) in materialized views
         - Upsert conflict keys match: 'user_id,dish_id,visit_id' for dish_opinions
         - New fields (note, source) included in insert/upsert payloads
         - Photo points = 20 (not 15) in awardPoints and calculatePoints
         - getRatingTier thresholds: top≥90%+20ratings, good≥75%+5ratings, neutral≥60%+3ratings
         - user_badges has INSERT RLS policy allowing auth.uid()=user_id (badge awarded client-side)
         - DishRatingBadge minimum threshold is totalRatings >= 3 (was > 0)
         - restaurantRatingService no longer multiplies food_score by 100
         - In-context visit lookup: scoped to last 24 hours, source='in_context'

      3. No unintended changes: files modified should only be those relevant to this step.

      4. Step 1 only: confirm dish_ratings_summary has columns okay_percentage, dislike_percentage,
         recent_notes; confirm restaurant_ratings_summary has food_score (0-100 Bayesian), total_dish_ratings,
         would_recommend_percentage, total_experience_responses.

      If any check fails:
        - Describe the exact issue and the file/line where it occurs.
        - Emit `step.retry` so the Implementer can fix it.

      If all checks pass:
        - Emit `step.verified` with the step number.
    triggers:
      - "step.complete"
    publishes:
      - "step.verified"
      - "step.retry"

  stepper:
    name: "Stepper"
    emoji: "📋"
    description: "Checks checklist progress after each verified step and drives the loop forward or signals completion"
    instructions: |
      You are the progress manager for the EatMe rating system implementation.

      Read the checklist in:
        .agents/planning/2026-04-08-rating-system/implementation/plan.md

      Count the remaining unchecked items [ ].

      If unchecked items remain:
        - Emit `start` to trigger the Implementer for the next step.

      If ALL 8 items are checked [x]:
        - Run `pnpm tsc --noEmit` one final time to confirm a clean baseline.
        - Confirm all 8 checklist items are marked [x].
        - Emit `LOOP_COMPLETE`.
    triggers:
      - "step.verified"
    publishes:
      - "start"
      - "LOOP_COMPLETE"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
