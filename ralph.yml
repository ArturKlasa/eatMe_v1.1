# Ralph Orchestrator Configuration
# Project: EatMe — Web Portal Redesign
# Task: Implement 20-step plan at .agents/planning/2026-04-10-web-portal-redesign/implementation/plan.md
# Pattern: Linear pipeline — implementer → verifier (build) → critic (design) → stepper → (loop or done)
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "start"
  max_iterations: 160              # 20 steps × ~6-8 iterations each (4 hats per cycle)
  max_runtime_seconds: 21600       # 6 hours
  idle_timeout_secs: 600           # 10 min idle threshold
  checkpoint_interval: 2           # git checkpoint every 2 iterations

core:
  specs_dir: ".agents/planning/2026-04-10-web-portal-redesign/"
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "Implementation plan: .agents/planning/2026-04-10-web-portal-redesign/implementation/plan.md — work through steps in order, one at a time."
    - "Design document: .agents/planning/2026-04-10-web-portal-redesign/design/detailed-design.md — the authoritative source for all interfaces, component specs, and token mappings."
    - "Steps 1–20 modify apps/web-portal/ only, EXCEPT Step 2 which also modifies packages/tokens/."
    - "Do NOT modify apps/mobile/, infra/, or any package other than packages/tokens/ (Step 2 only)."
    - "CRITICAL: Do NOT break existing functionality. Every page and API route that worked before must still work after each step."
    - "After any TypeScript change, run `pnpm turbo run build --filter=web-portal` and fix ALL errors before marking a step complete."
    - "After any lint-sensitive change, run `pnpm turbo run lint --filter=web-portal` and fix warnings/errors."
    - "Each step includes test requirements — write and run those tests before marking the step complete."
    - "Do NOT add new npm dependencies without first checking that no existing package already provides the functionality."
    - "Do NOT modify files unrelated to the current implementation step."
    - "Do NOT refactor, rename, or reformat code outside the scope of each step."
    - "Prefer editing existing files over creating new ones. Only create new files when the plan explicitly calls for them."
    - "Never hardcode colors. All colors must use semantic Tailwind token classes (bg-background, text-foreground, text-muted-foreground, bg-brand-primary, etc.)."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  implementer:
    name: "Implementer"
    emoji: "🔧"
    description: "Reads the implementation plan, implements the next unchecked step with minimal change, and runs build validation"
    instructions: |
      You are a senior Next.js / TypeScript / Tailwind CSS v4 / shadcn/ui / Supabase engineer implementing
      the EatMe web portal redesign.

      Start by reading the checklist in:
        .agents/planning/2026-04-10-web-portal-redesign/implementation/plan.md

      Find the FIRST unchecked item [ ] and implement that step only.

      For every step:
        1. Read the scratchpad (.agent/scratchpad.md) first — it may contain progress notes from a previous
           iteration on the same step (e.g., after a retry). Continue from where you left off.
        2. Read the full step description in the implementation plan and the relevant section in:
           .agents/planning/2026-04-10-web-portal-redesign/design/detailed-design.md
        3. Read every file you plan to modify or reference BEFORE changing it.
        4. Implement exactly what the step describes. No extra refactoring, no speculative additions.
        5. Run `pnpm turbo run build --filter=web-portal` after any TypeScript changes. Fix all errors.
        6. If the step includes test requirements, write and run tests with `cd apps/web-portal && npx vitest run`. Fix failures.
        7. Mark the step complete: change `[ ]` to `[x]` in the checklist.
        8. Clear the scratchpad (replace contents with "Step N complete") and emit `step.complete` with a short summary.

      Step-specific notes:

        Step 1 (quick wins):
          - Remove mapbox-gl and react-map-gl from apps/web-portal/package.json and run pnpm install.
          - Create middleware.ts using @supabase/ssr createServerClient to read session cookies.
          - Protected routes: /admin/*, /menu/*, /restaurant/*, /onboard/* → /auth/login if unauthenticated.
          - Already-authenticated users on /auth/login or /auth/signup → redirect to /.
          - Create app/loading.tsx and app/admin/loading.tsx using the existing LoadingSkeleton component.

        Step 2 (token pipeline):
          - Add culori and tsx as dev deps to packages/tokens only: pnpm add -D culori tsx.
          - Create packages/tokens/scripts/generate-css-vars.ts — converts hex→oklch via culori, px→rem.
          - Add card: 24 to the spacing tokens before generating.
          - Update @eatme/tokens colors to use orange as brand primary (#FF9800 replacing #007AFF).
          - Output writes to apps/web-portal/app/tokens.css.
          - Add @import './tokens.css'; as the FIRST line of apps/web-portal/app/globals.css.
          - Add prebuild and predev scripts to root package.json.

        Step 3 (ThemeProvider + ThemeToggle):
          - Create components/ThemeToggle.tsx cycling light → dark → system with Sun/Moon/Monitor icons.
          - Wrap layout.tsx body children with <ThemeProvider attribute="class" defaultTheme="system" enableSystem>.
          - Add suppressHydrationWarning to the <html> tag.
          - Add ThemeToggle to AdminHeader.tsx (top-right, next to user email).
          - Create components/OwnerHeader.tsx — reads useAuth() internally; renders null when user is null
            or when user.role === 'admin'. Includes logo + ThemeToggle + sign-out. Add to root layout.tsx.

        Step 4 (admin shell color migration):
          - Replace all hardcoded colors in AdminSidebar.tsx, AdminHeader.tsx, app/admin/layout.tsx with semantic tokens.
          - Key replacements: bg-white → bg-background, bg-gray-50 → bg-muted/30, border-gray-200 → border,
            text-gray-500/600 → text-muted-foreground, text-gray-700/800/900 → text-foreground,
            hover:bg-gray-50/100 → hover:bg-accent, bg-orange-50/text-orange-600 (active nav) → bg-brand-primary/10 text-brand-primary.
          - Security notice: apply surface-warning text-warning directly (surface-warning added in Step 6;
            apply the bg/border/text values directly here since the utility class isn't defined yet).
          - Add --color-brand-primary and --color-brand-accent mappings to globals.css @theme inline block.

        Step 5 (full color migration):
          - Work file-by-file across all admin pages, owner pages, and shared components.
          - Add --color-success, --color-warning, --color-info to globals.css @theme inline (light) and .dark blocks.
          - Do NOT touch components/ui/ (shadcn primitives keep their internal classes).
          - Write a Vitest test using fs.readFileSync that fails if hardcoded color patterns appear outside components/ui/.

        Step 6 (utility layer):
          - Add @layer utilities block to globals.css with focus-ring, interactive, icon-sm/md, animate-enter, surface-* classes.
          - Update select.tsx, dropdown-menu.tsx, tabs.tsx shadcn primitives to use the new utility classes.
          - Note: In Tailwind v4, @layer utilities is valid but @utility directive is also available. Use @layer utilities.

        Step 7 (StatusBadge, InfoBox, SectionCard):
          - StatusBadge: variants active/inactive/pending/error/warning/draft, sizes sm/md. Uses STATUS_CONFIG map.
          - InfoBox: variants info/warning/success/error/tip. Uses surface-* utility classes from Step 6.
          - SectionCard: collapsible via Radix <Collapsible> + <CollapsibleContent>. animate-enter targets data-[state] attrs.
          - Replace existing usages in RestaurantForm.tsx blue info box (line ~362) and admin header admin badge.

        Step 8 (hooks):
          - Create hooks/useDialog.ts with close() (keeps data) and reset() (clears immediately) semantics.
          - Create hooks/usePagination.ts: accepts items + pageSize=25, resets to page 1 when items.length changes.
          - Create hooks/useFilters.ts: FilterEntry<T>[] with value + fn. Active when value is non-empty. AND logic.

        Step 9 (hook adoption):
          - Refactor app/admin/restaurants/[id]/menus/page.tsx to use useDialog.
          - Refactor app/admin/ingredients/page.tsx to use useDialog + usePagination + useFilters.
          - useDialog: dialog close via onOpenChange(false) callback, NOT inside the onSuccess handler.
            Pattern: <Dialog onOpenChange={(open) => { if (!open) dialog.close(); }}>

        Step 10 (DataTable + SearchFilterBar):
          - Create components/DataTable.tsx: pure renderer — no internal filter/sort state.
            Parent pre-filters via hooks. Accepts columns, data, pagination prop, emptyState.
          - Create components/SearchFilterBar.tsx: accepts filters config array + onChange callbacks.

        Step 11 (RestaurantTable replacement):
          - Use DataTable + SearchFilterBar directly in app/admin/restaurants/page.tsx.
          - DELETE components/admin/RestaurantTable.tsx entirely.
          - DataTable pagination prop wires up to usePagination hook in the parent page.

        Step 12 (LocationFormSection):
          - Extract components/LocationFormSection.tsx from RestaurantForm.
          - Wire into react-hook-form via <Controller>:
            <Controller name="location" control={control}
              render={({ field }) => <LocationFormSection value={field.value} onChange={field.onChange} />} />

        Step 13 (unified RestaurantForm):
          - Replace role prop with sections: RestaurantFormSection config object.
          - Add enableDraft prop — when true, RestaurantForm calls useAuth() internally to get userId.
          - Merge NewRestaurantForm.tsx logic into RestaurantForm.tsx.
          - cuisine cascade: show InfoBox variant="warning" if cuisines are changed (warns about dish impact).

        Step 14 (admin create/edit pages):
          - Refactor /admin/restaurants/new and /admin/restaurants/[id]/edit to use unified RestaurantForm.
          - DELETE components/admin/NewRestaurantForm.tsx entirely after verifying no remaining imports.

        Step 15 (owner edit page):
          - Add cuisines selector, service options, and payment methods to app/restaurant/edit/page.tsx.
          - These fields exist in the DB but are missing from the owner edit form.

        Step 16 (menu-scan extraction):
          - Create lib/menu-scan-utils.ts — pure functions extracted from menu-scan page.
          - Create app/admin/menu-scan/hooks/useMenuScanState.ts — all state, actions, async logic.
          - Target LOC for menu-scan page BEFORE this step: ~2,500 LOC. Mock pdfToImages for tests:
            create __mocks__/pdfjs-dist.ts and use vi.mock('pdfjs-dist').

        Step 17 (menu-scan step components):
          - Create MenuScanUpload.tsx, MenuScanProcessing.tsx, MenuScanReview.tsx in app/admin/menu-scan/components/.
          - Reduce app/admin/menu-scan/page.tsx to ~80 LOC orchestrator that imports useMenuScanState and the 3 step components.

        Step 18 (auth improvements):
          - Add password visibility toggle to login and signup forms (eye icon button).
          - Create app/auth/forgot-password/page.tsx — email input + supabase.auth.resetPasswordForEmail().
            redirectTo must be the FULL URL: `${process.env.NEXT_PUBLIC_SITE_URL}/auth/reset-password`
          - Create app/auth/reset-password/page.tsx — reads token_hash + type from URL params.
            Use supabase.auth.verifyOtp({ token_hash, type: 'recovery' }) NOT exchangeCodeForSession.

        Step 19 (onboarding + mobile):
          - Fix onboarding routing: app/onboard/basic-info/page.tsx must push to /onboard/menu NOT /onboard/review.
          - Add mobile responsiveness: hamburger menu in AdminHeader for mobile, responsive grid in admin pages.
          - Write responsive tests by asserting className strings (jsdom cannot compute layouts),
            e.g., assert className includes 'md:hidden' or 'hidden md:flex'.

        Step 20 (visual polish):
          - Spacing pass: replace raw px values with p-card utility (uses --token-space-card from Step 2).
          - Typography: ensure heading hierarchy uses token-based sizes.
          - Dialog animations: use @starting-style in globals.css (no @supports wrapper needed).
          - Badge size variants: ensure StatusBadge sm/md sizes are applied consistently.
    triggers:
      - "start"
      - "step.retry"
    publishes:
      - "step.complete"
      - "step.blocked"

  verifier:
    name: "Verifier"
    emoji: "✅"
    description: "Build gate — confirms TypeScript compiles, tests pass, and no unintended files were changed"
    instructions: |
      You are a build gate. Your ONLY job is confirming that the code compiles, tests pass, and scope is clean.
      Do NOT review design conformance — the Critic handles that.

      Run these checks in order:

      1. Build: `pnpm turbo run build --filter=web-portal` — must succeed with zero errors.

      2. Lint: `pnpm turbo run lint --filter=web-portal` — must pass with zero errors.
         Warnings are acceptable but errors must be fixed.

      3. Tests: `cd apps/web-portal && npx vitest run` — all tests must pass.

      4. Scope: check that only files relevant to this step were modified.
         - Step 2: only packages/tokens/ files and apps/web-portal/app/tokens.css and apps/web-portal/app/globals.css
         - All other steps: only apps/web-portal/ files
         - No changes to apps/mobile/, infra/, or packages/ (except packages/tokens/ in Step 2)
         Run `git diff --name-only` to verify.

      If any check fails:
        - Report the exact error output.
        - Emit `step.retry` so the Implementer can fix it.

      If all checks pass:
        - Emit `build.verified` with the step number.
    triggers:
      - "step.complete"
    publishes:
      - "build.verified"
      - "step.retry"

  critic:
    name: "Critic"
    emoji: "🔍"
    description: "Design conformance reviewer — reads the design spec with fresh eyes and verifies the implementation matches"
    instructions: |
      You are a design reviewer with fresh eyes. The build already passes — your job is to verify
      the implementation matches the design spec and catches issues the Implementer may have missed.

      Read the event payload to identify which step was completed.

      1. Read the FULL step description in:
         .agents/planning/2026-04-10-web-portal-redesign/implementation/plan.md

      2. Read the relevant section in:
         .agents/planning/2026-04-10-web-portal-redesign/design/detailed-design.md

      3. Read every file created or modified in this step. Check:
         - No hardcoded color classes (bg-gray-*, text-gray-*, bg-orange-*, etc.) outside components/ui/
         - No new npm dependencies added without explicit plan authorization
         - New components match the interfaces specified in the design document
         - Existing functionality is not broken — API routes, forms, and navigation still work

      4. Step-specific design checks:
         - Step 1: middleware.ts handles all 4 protected route patterns. Both loading.tsx files exist and use LoadingSkeleton.
           mapbox-gl and react-map-gl removed from package.json.
         - Step 2: tokens.css has --token-color-*, --token-space-*, --token-type-*, --token-radius-* variables.
           @import './tokens.css' is FIRST line of globals.css. Brand primary is orange (#FF9800-derived oklch).
           card spacing token (24px → 1.5rem) exists. culori and tsx added to packages/tokens only.
         - Step 3: ThemeProvider wraps body in layout.tsx. suppressHydrationWarning on <html>.
           ThemeToggle in AdminHeader. OwnerHeader self-hides for admin users and null users.
         - Step 4: No bg-white, bg-gray-*, text-gray-* in AdminSidebar, AdminHeader, admin layout.
           Active nav item uses bg-brand-primary/10 text-brand-primary. Security notice uses correct surface pattern.
         - Step 5: grep check test exists. All pages pass it. components/ui/ excluded from check.
           --color-success, --color-warning, --color-info defined in globals.css for both light and .dark.
         - Step 6: @layer utilities block in globals.css with all 5 surface-* classes and focus-ring, interactive, icon-sm/md, animate-enter.
           select.tsx, dropdown-menu.tsx, tabs.tsx updated.
         - Step 7: StatusBadge has all 6 variants. InfoBox has all 5 variants. SectionCard collapsible uses Radix Collapsible.
           Existing usages in RestaurantForm replaced.
         - Step 8: useDialog close() keeps data (isOpen=false, data unchanged). reset() clears data to null.
           useFilters uses FilterEntry<T>[] with value+fn pattern.
         - Step 9: menus/page uses useDialog. ingredients/page uses all 3 hooks.
           Dialog closes via onOpenChange callback, NOT inside onSuccess.
         - Step 10: DataTable has no internal filter state. pagination prop accepted. emptyState prop accepted.
         - Step 11: RestaurantTable.tsx is DELETED. Restaurants page uses DataTable + SearchFilterBar directly.
         - Step 12: LocationFormSection wired via <Controller> bridge, not direct field props.
         - Step 13: sections config object (not role prop). enableDraft uses internal useAuth() for userId.
           cuisine change warning uses InfoBox variant="warning".
         - Step 14: NewRestaurantForm.tsx is DELETED. Admin create/edit use unified RestaurantForm.
         - Step 15: owner edit page has cuisines selector, service options, payment methods fields.
         - Step 16: menu-scan-utils.ts has pure functions only (no React). useMenuScanState has all async logic.
           pdfjs-dist mocked via __mocks__/pdfjs-dist.ts.
         - Step 17: menu-scan/page.tsx is ≤100 LOC. Three step components exist. useMenuScanState imported.
         - Step 18: verifyOtp({ token_hash, type: 'recovery' }) used (NOT exchangeCodeForSession).
           redirectTo uses full URL with NEXT_PUBLIC_SITE_URL env var.
         - Step 19: basic-info/page.tsx pushes to /onboard/menu (NOT /onboard/review).
           Responsive tests assert className strings, not layout computations.
         - Step 20: p-card used for card padding. @starting-style in globals.css with NO @supports wrapper.

      If any issue found:
        - Describe the exact issue, the file/line, and what the design spec expects.
        - Emit `step.retry` so the Implementer can fix it.

      If everything matches the design:
        - Emit `step.verified` with the step number and a one-line confirmation.
    triggers:
      - "build.verified"
    publishes:
      - "step.verified"
      - "step.retry"

  stepper:
    name: "Stepper"
    emoji: "📋"
    description: "Checks checklist progress after each verified step and drives the loop forward or signals completion"
    instructions: |
      You are the progress manager for the EatMe web portal redesign implementation.

      Read the checklist in:
        .agents/planning/2026-04-10-web-portal-redesign/implementation/plan.md

      Count the remaining unchecked items [ ].

      If unchecked items remain:
        - Emit `start` to trigger the Implementer for the next step.

      If ALL 20 items are checked [x]:
        - Run `pnpm turbo run build --filter=web-portal` one final time.
        - Run `cd apps/web-portal && npx vitest run` one final time.
        - Confirm all 20 checklist items are marked [x].
        - Confirm tokens.css exists and is imported first in globals.css.
        - Confirm NewRestaurantForm.tsx and RestaurantTable.tsx are deleted.
        - Confirm app/auth/forgot-password/page.tsx and app/auth/reset-password/page.tsx exist.
        - Emit `LOOP_COMPLETE`.
    triggers:
      - "step.verified"
    publishes:
      - "start"
      - "LOOP_COMPLETE"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
