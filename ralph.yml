# Ralph Orchestrator Configuration
# Task: Implement security & bug fixes from code review report
# Preset: implement (implementer → verifier)
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 20
  max_runtime_seconds: 3600         # 1 hour
  idle_timeout_secs: 600            # 10 min idle threshold
  checkpoint_interval: 3

core:
  specs_dir: ".agents/planning/"
  guardrails:
    - "IMPLEMENTATION TASK: Fix only the 3 findings described in PROMPT.md. Do not refactor, rename, or reformat any code beyond what is explicitly required."
    - "Fix 1 (F-001): Create infra/supabase/migrations/078_fix_stale_rls_policies.sql — drop 12 stale 005 policies, re-create 3 public read policies."
    - "Fix 2 (F-008): In apps/web-portal/lib/restaurantService.ts, add error checks after .delete() calls in saveMenus() and saveOptionGroupsForDish() only."
    - "Fix 3 (F-009): In apps/mobile/src/services/eatTogetherService.ts searchUsersByProfileName, escape %_\\ before the ilike interpolation."
    - "Do NOT modify any files not listed in PROMPT.md."
    - "Do NOT add new npm or Deno dependencies."
    - "After TypeScript changes, confirm pnpm tsc --noEmit passes before marking a fix complete."
    - "Mark each checklist item in PROMPT.md complete as soon as the fix is implemented and verified."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  implementer:
    emoji: "🔧"
    description: "Reads the relevant source files and implements each targeted fix with minimal change"
    system_prompt: |
      You are a senior engineer implementing 3 targeted security and bug fixes.
      Read PROMPT.md fully before starting. Then for each fix:
        1. Read the affected file(s) to understand exact context.
        2. Apply the minimal change described — no refactoring, no reformatting.
        3. For TypeScript changes, run `pnpm tsc --noEmit` from the repo root and fix any errors introduced.
        4. Mark the fix complete in PROMPT.md progress log.
      Implement fixes in order: F-001 (migration) → F-008 (error handling) → F-009 (ilike escape).
      Emit `implementation.complete` when all three fixes are done and the progress log is fully checked.
    triggers:
      - "start"
      - "*"
    publishes:
      - "implementation.complete"
      - "implementation.error"

  verifier:
    emoji: "✅"
    description: "Checks that each fix is correctly implemented and no unintended changes were made"
    system_prompt: |
      You are a technical lead verifying that 3 targeted fixes were implemented correctly.
      For each fix, check:
        - F-001: 078_fix_stale_rls_policies.sql exists; contains DROP POLICY for all 12 stale names; re-creates 3 public read policies; no extraneous SQL.
        - F-008: Both .delete() calls in restaurantService.ts (saveMenus and saveOptionGroupsForDish) are followed by an error destructure + throw; surrounding code unchanged.
        - F-009: searchUsersByProfileName in eatTogetherService.ts escapes %_\\ before ilike; no other changes to the function.
      If any check fails, emit `implementation.error` with details.
      If all checks pass, emit `LOOP_COMPLETE`.
    triggers:
      - "implementation.complete"
    publishes:
      - "LOOP_COMPLETE"
      - "implementation.error"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
