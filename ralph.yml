# Ralph Orchestrator Configuration
# Task: Universal Dish Structure — Schema Migration & Implementation
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 80
  max_runtime_seconds: 14400     # 4 hours — complex multi-layer changes across DB, backend, mobile, web
  idle_timeout_secs: 1800        # 30 min idle safety net
  checkpoint_interval: 3         # Git checkpoint every 3 iterations

core:
  specs_dir: ".agents/planning/2026-04-05-universal-dish-structure/"
  guardrails:
    - "Read the detailed design at .agents/planning/2026-04-05-universal-dish-structure/design/detailed-design.md before implementing any change."
    - "Read the corresponding research files in .agents/planning/2026-04-05-universal-dish-structure/research/ for decision rationale."
    - "Always read a file before modifying it. The codebase has recent changes."
    - "The database migration must be additive only — no data loss, no breaking changes to existing rows. All new columns must have sensible defaults."
    - "Do not create new tables. Use self-referential FK on dishes table as specified in the design."
    - "Do not add new dependencies. Use existing libraries and patterns."
    - "After database migration, regenerate types: supabase gen types typescript --project-id tqroqqvxabolydyznewa > packages/database/src/types.ts"
    - "Parent dishes (is_parent=true) must be excluded from feed, have no embedding, price=0, and exist only for menu display grouping."
    - "All existing dishes must continue working unchanged with default values (parent_dish_id=null, is_parent=false, serves=1)."
    - "Update the Progress Log checkboxes in PROMPT.md after completing each item."
    - "Do not deviate from schema definitions, field names, or enum values specified in the design document."
    - "When modifying edge functions, preserve existing functionality — only add new filter parameters and parent exclusion logic."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context"]

tasks:
  enabled: true

features:
  parallel: false              # Sequential — migration must precede type generation, types must precede code changes
  auto_merge: false
  preflight:
    enabled: true
    strict: false
