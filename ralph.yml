# Ralph Orchestrator Configuration
# Task: EatMe v1 Project Documentation Generation
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 60
  max_runtime_seconds: 10800     # 3 hours — 20 files is substantial
  idle_timeout_secs: 1800        # 30 min idle safety net
  checkpoint_interval: 3         # Git checkpoint every 3 iterations (frequent saves for docs)

core:
  specs_dir: ".agents/planning/2026-04-05-project-documentation/"
  guardrails:
    - "Only create or modify files inside docs/project/. Do not touch source code, migrations, configs, or any other files."
    - "Read the detailed design at .agents/planning/2026-04-05-project-documentation/design/detailed-design.md before writing any file."
    - "Read the corresponding research file in .agents/planning/2026-04-05-project-documentation/research/ before writing each documentation file."
    - "When research notes lack detail, read the actual source code to fill gaps. Never invent information."
    - "Use Mermaid sequenceDiagram syntax for all diagrams. Validate syntax before writing."
    - "Mark missing information with <!-- TODO: description --> HTML comments."
    - "Update the Progress Log checkboxes in PROMPT.md after completing each file."
    - "Do not describe planned or future features. Document only what is currently implemented."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context"]

tasks:
  enabled: true

features:
  parallel: false              # Sequential — docs must build on each other
  auto_merge: false
  preflight:
    enabled: true
    strict: false
