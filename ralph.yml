# Ralph Orchestrator Configuration
# Project: EatMe — Codebase Review (read-only)
# Task: Review the entire EatMe monorepo for correctness, security,
#       maintainability, and convention-adherence issues. Produce findings
#       only — NO code changes, NO commits, NO file edits outside the
#       review output directory.
# Pattern: scoper → reviewer (loop per area) → synthesizer → LOOP_COMPLETE
# Mode: READ-ONLY. Source edits are forbidden.
# Docs: https://mikeyobrien.github.io/ralph-orchestrator/

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "review.start"
  max_iterations: 60
  max_runtime_seconds: 14400       # 4 hours
  idle_timeout_secs: 900
  checkpoint_interval: 5

core:
  specs_dir: ".agents/research/"
  scratchpad: ".agent/scratchpad.md"
  guardrails:
    - "READ-ONLY MODE. Do not edit, create, move, or delete any file under apps/, packages/, infra/, or the repo root. The only writable locations are `.agent/scratchpad.md` and `.agents/research/codebase-review-2026-04-16/`."
    - "Never run `git add`, `git commit`, `git push`, `git reset`, `git checkout -- <files>`, or any command that mutates tracked files. Read-only git commands (`git log`, `git blame`, `git diff`, `git show`) are fine."
    - "Do not run code formatters, linters, or codegen in write mode. `turbo check-types`, `turbo lint`, read-only CLI tools are allowed for evidence gathering."
    - "Every finding must cite file:line. Unverified claims are not findings — verify with a second read before recording."
    - "Migrations under infra/supabase/migrations/ are read-only history. Review them for issues but never propose edits to existing migrations — only new-migration recommendations."
    - "Generated files (*.generated.ts, Supabase types in packages/database/src/types/) are off-limits to review — they are not human-authored."
    - "Classify every finding with severity (critical | high | medium | low | info) and category (security | correctness | performance | maintainability | a11y | conventions | dx)."
    - "If a suspected issue cannot be confirmed from code inspection alone, mark it `needs-verification` with a concrete repro or question rather than asserting a defect."
    - "Never skip git hooks. Never bypass signing. Never force-push. These do not apply in read-only mode but the prohibition stands."

memories:
  enabled: true
  inject: "auto"
  budget: 2000
  filter:
    types: ["pattern", "context", "decision"]

tasks:
  enabled: true

hats:
  scoper:
    name: "Review Scoper"
    emoji: "🗺️"
    description: "Surveys the repo and produces a prioritised agenda of review areas"
    instructions: |
      You are scoping a read-only codebase review of the EatMe monorepo.
      No source edits are permitted in any hat of this loop.

      Read in order:
      1. PROMPT.md — review goal, scope, deliverables, acceptance criteria
      2. CLAUDE.md — project conventions and pitfalls
      3. agent_docs/architecture.md — package relationships
      4. Top-level `apps/` and `packages/` structure (use `ls`/Glob, not `tree`)

      Produce an agenda of 8-14 review AREAS (not individual bugs — areas).
      Good review areas include:
      - `apps/web-portal` — Next.js routing, server actions, form handling
      - `apps/web-portal` — admin menu-scan flow (AI pipeline surface)
      - `apps/mobile` — Expo navigation + Zustand stores
      - `apps/mobile` — i18n coverage (en/es/pl)
      - `packages/database` — Supabase client factory, RLS assumptions
      - `packages/shared` — Zod schemas, shared types, constants
      - `packages/tokens` — design token usage consistency
      - Supabase schema — RLS policies, FK integrity, indexes
      - Auth & session handling — web portal + mobile
      - PostGIS usage — POINT(lng lat) correctness across call sites
      - Error handling at system boundaries (API routes, Supabase calls)
      - Type safety — unsafe `as` casts, `any`, missing Zod parse
      - Dependency hygiene — unused deps, version drift across workspaces
      - Test coverage gaps in high-risk surfaces

      Write the agenda to `.agent/scratchpad.md` in this format per area:
      ```
      - [ ] REV-01: <slug> — <1-line area description>
        - Why it matters: <risk hypothesis>
        - Key paths: <dirs / representative files>
        - Focus categories: <security | correctness | perf | maintainability | a11y | conventions | dx>
        - Detail file: .agents/research/codebase-review-2026-04-16/<slug>.md
      ```

      Sort by risk × surface area (security/correctness first, DX last).

      Do NOT review in depth in this hat — only scope. Do NOT edit source.
      When the agenda is written, emit `agenda.ready`.
    triggers:
      - "review.start"
    publishes:
      - "agenda.ready"

  reviewer:
    name: "Reviewer"
    emoji: "🔍"
    description: "Reviews one area per activation and writes a findings file"
    instructions: |
      You are reviewing ONE area per activation. READ-ONLY — no source edits.

      Start every activation by:
      1. Reading `.agent/scratchpad.md`
      2. Picking the FIRST area still marked `[ ]`
      3. Reading the referenced paths in depth (use Explore sub-agents for
         wide traces, Grep/Read for targeted checks)

      For each area, investigate against these categories as applicable:
      - **security** — RLS bypass, missing auth checks, secret leakage,
        SQL/XSS/command injection, open redirects, unsafe deserialisation
      - **correctness** — race conditions, off-by-one, nullability holes,
        PostGIS POINT order mistakes, floating-point money, timezone bugs,
        Zod schemas that don't match runtime shape
      - **performance** — N+1 queries, missing indexes, large client bundles,
        unnecessary re-renders, unbatched network calls
      - **maintainability** — duplicate logic, god-components, unclear
        naming, missing types at boundaries, dead code, excessive casts
      - **a11y** (web-portal only) — missing labels, color contrast in
        tokens, keyboard traps, focus management
      - **conventions** — departures from patterns documented in CLAUDE.md
        and agent_docs/
      - **dx** — broken scripts, missing type-check coverage, flaky tests

      Write findings to
      `.agents/research/codebase-review-2026-04-16/<slug>.md` in this shape:
      ```
      # <Area title>

      ## Scope reviewed
      List the files / directories actually read (with line ranges if partial).

      ## Findings

      ### REV-01-a: <short title>
      - Severity: critical | high | medium | low | info
      - Category: security | correctness | performance | maintainability | a11y | conventions | dx
      - Location: `path/to/file.ts:42-58`
      - Observation: What the code does today (cite file:line).
      - Why it matters: Concrete risk or cost.
      - Suggested direction: How a future fix might approach this (do NOT
        implement — this is advisory only).
      - Confidence: confirmed | likely | needs-verification
      - Evidence: command output, cross-references, or quoted snippet.

      ### REV-01-b: ...

      ## No issues found in
      Bullet list of sub-areas checked that came back clean — prevents
      future passes from re-investigating.

      ## Follow-up questions
      Anything that would need runtime traces, DB inspection, or product
      context to resolve. Frame as questions, not assertions.
      ```

      After writing the findings file:
      1. Mark the agenda item `[x]` in `.agent/scratchpad.md` and append
         `(N findings: <critical>c/<high>h/<medium>m/<low>l/<info>i)`.
      2. If at least one `[ ]` area remains — emit `area.reviewed` to loop
         back to yourself for the next area.
      3. If no `[ ]` areas remain — emit `review.complete` to hand off to
         the synthesizer.

      You MUST NOT edit, create, or delete any file outside
      `.agent/scratchpad.md` and
      `.agents/research/codebase-review-2026-04-16/`.
    triggers:
      - "agenda.ready"
      - "area.reviewed"
    publishes:
      - "area.reviewed"
      - "review.complete"

  synthesizer:
    name: "Synthesizer"
    emoji: "📊"
    description: "Aggregates per-area findings into a single review report, emits LOOP_COMPLETE"
    instructions: |
      You finalise the review. READ-ONLY — no source edits.

      1. Read every file under
         `.agents/research/codebase-review-2026-04-16/` (except any file
         you are about to write).

      2. Write
         `.agents/research/codebase-review-2026-04-16/00-summary.md` with:
         - **Executive summary** — 4-8 sentences: what was reviewed, the
           top 3-5 risks, overall health signal.
         - **Severity rollup** — counts by severity across the whole
           review: `critical: N, high: N, medium: N, low: N, info: N`.
         - **Top findings** — the 5-10 highest-severity items across all
           areas, each as: title, severity, category, location
           (`file:line`), one-sentence observation, link to the detail
           file (markdown link).
         - **Areas table** — columns: Area | Status | Findings count |
           Highest severity | Detail file (markdown link).
         - **Category heatmap** — findings count per category so the team
           can see where systemic issues cluster.
         - **Needs-verification queue** — every finding marked
           `needs-verification` with the question or repro needed.
         - **Out of scope / not reviewed** — anything intentionally
           skipped with a brief reason (so future passes know).
         - **Recommended next steps** — ordered list of concrete
           follow-ups the team could take, grouped by severity.

      3. Sanity check acceptance criteria in PROMPT.md. If every box
         ticks, emit `LOOP_COMPLETE`. If not, list unmet criteria at the
         top of the summary and emit `area.reviewed` to loop back to the
         reviewer for another pass (the reviewer will re-pick any `[ ]`
         item — if none remain, add a new one to the agenda explaining
         what still needs coverage).

      You MUST NOT edit, create, or delete any file outside
      `.agents/research/codebase-review-2026-04-16/`.
    triggers:
      - "review.complete"
    publishes:
      - "LOOP_COMPLETE"
      - "area.reviewed"

features:
  parallel: false
  auto_merge: false
  preflight:
    enabled: false
